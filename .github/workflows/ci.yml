name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Unit checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit checks
        run: make check

  base-fork-integration:
    name: Base fork integration
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 20

    steps:
      - name: Check BASE_RPC_URL secret
        id: base-rpc
        env:
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
        run: |
          if [ -z "$BASE_RPC_URL" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "BASE_RPC_URL is not configured or unavailable; skipping Base fork integration tests."
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        if: steps.base-rpc.outputs.available == 'true'
        uses: actions/checkout@v4

      - name: Set up Go
        if: steps.base-rpc.outputs.available == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Foundry
        if: steps.base-rpc.outputs.available == 'true'
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Start Base fork
        if: steps.base-rpc.outputs.available == 'true'
        env:
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
        run: |
          nohup anvil --fork-url "$BASE_RPC_URL" --chain-id 8453 --host 127.0.0.1 --port 8545 > anvil.log 2>&1 &
          echo "$!" > anvil.pid

      - name: Wait for Base fork
        if: steps.base-rpc.outputs.available == 'true'
        run: |
          for i in {1..30}; do
            if curl --silent --fail \
              --request POST \
              --header 'Content-Type: application/json' \
              --data '{"jsonrpc":"2.0","method":"eth_chainId","params":[],"id":1}' \
              http://127.0.0.1:8545 > /dev/null; then
              exit 0
            fi

            sleep 2
          done

          echo "Anvil Base fork did not become ready in time."
          exit 1

      - name: Run Base fork integration tests
        if: steps.base-rpc.outputs.available == 'true'
        run: BASE_RPC_URL=http://127.0.0.1:8545 make test-integration

      - name: Stop Base fork
        if: always() && steps.base-rpc.outputs.available == 'true'
        run: |
          if [ -f anvil.pid ]; then
            kill "$(cat anvil.pid)" || true
          fi
